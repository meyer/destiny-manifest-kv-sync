name: Sync Destiny manifest to KV store

on:
  schedule:
    - cron: "0 18 * * *"
  push:
    branches: [main]
  pull_request_target:
  workflow_dispatch:

jobs:
  sync-manifest:
    name: Download and sync
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name != github.repository && 'preview' || null }}

    steps:
      - name: Get manifest version
        id: manifest
        env:
          BUNGIE_API_KEY: ${{ secrets.BUNGIE_API_KEY }}
          SERVER_URL: ${{ secrets.SERVER_URL }}
        run: |
          version=$(curl -sf -H "X-API-Key: $BUNGIE_API_KEY" -H "Origin: $SERVER_URL" \
            https://www.bungie.net/Platform/Destiny2/Manifest/ | jq -r '.Response.version')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Current manifest version: $version"

      - name: Check if already synced
        id: cache
        if: github.event_name == 'push'
        uses: actions/cache@v5
        with:
          path: .manifest-synced
          key: manifest-${{ steps.manifest.outputs.version }}
          lookup-only: true

      - name: Skip (already synced)
        if: steps.cache.outputs.cache-hit == 'true'
        run: echo "Manifest ${{ steps.manifest.outputs.version }} already synced, skipping"

      - uses: actions/checkout@v6
        if: steps.cache.outputs.cache-hit != 'true'
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: pnpm/action-setup@v5
        if: steps.cache.outputs.cache-hit != 'true'

      - uses: actions/setup-node@v6
        if: steps.cache.outputs.cache-hit != 'true'
        with:
          node-version-file: .node-version
          cache: "pnpm"

      - run: pnpm install
        if: steps.cache.outputs.cache-hit != 'true'

      - name: Sync manifest
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          DRY_RUN: ${{ github.event_name == 'pull_request_target' && 'true' || '' }}
          BUNGIE_API_KEY: ${{ secrets.BUNGIE_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_NAMESPACE_ID: ${{ secrets.CLOUDFLARE_NAMESPACE_ID }}
          SERVER_URL: ${{ secrets.SERVER_URL }}
        run: node src/downloadManifest.mjs

      - name: Mark as synced
        if: steps.cache.outputs.cache-hit != 'true' && github.event_name != 'pull_request_target'
        run: |
          mkdir -p .manifest-synced
          echo "${{ steps.manifest.outputs.version }}" > .manifest-synced/version

      - uses: actions/cache/save@v5
        if: steps.cache.outputs.cache-hit != 'true' && github.event_name != 'pull_request_target'
        with:
          path: .manifest-synced
          key: manifest-${{ steps.manifest.outputs.version }}
